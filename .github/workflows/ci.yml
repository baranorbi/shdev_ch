name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: mbstring, dom, fileinfo, pdo_sqlite, sqlite3
          tools: composer:v2

      - name: Validate Composer configuration
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Collect changed PHP files
        id: changed-php-files
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(git diff --name-only --diff-filter=ACMRT origin/${{ github.base_ref }}...HEAD -- '*.php')
          else
            files=$(git diff --name-only --diff-filter=ACMRT "${{ github.event.before }}" "${{ github.sha }}" -- '*.php')
          fi

          files=$(printf '%s\n' "$files" | tr '\n' ' ' | xargs)
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: php artisan test

      - name: Check code style
        if: steps.changed-php-files.outputs.files != ''
        run: vendor/bin/pint --test ${{ steps.changed-php-files.outputs.files }}

      - name: Run static analysis
        if: steps.changed-php-files.outputs.files != ''
        run: vendor/bin/phpstan analyse --no-progress --no-interaction --memory-limit=1G ${{ steps.changed-php-files.outputs.files }}